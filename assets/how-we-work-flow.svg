<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <!-- Background -->
  <rect x="0" y="0" width="1200" height="260" fill="none"/>

  <!-- Connecting line -->
  <line x1="120" y1="90" x2="1080" y2="90" stroke="#B08D57" stroke-width="2"/>

  <!-- Step 1: Discover -->
  <g>
    <circle cx="120" cy="90" r="42" fill="#1B2A3D"/>
    <text x="120" y="100" text-anchor="middle" fill="#F7F6F3" font-size="30" font-weight="bold">1</text>
    <text x="120" y="165" text-anchor="middle" fill="#1B2A3D" font-size="24" font-weight="bold">Discover</text>
    <text x="120" y="190" text-anchor="middle" fill="#4A4A4A" font-size="14" font-family="Arial, sans-serif">Understand the mission</text>
  </g>

  <!-- Step 2: Plan -->
  <g>
    <circle cx="360" cy="90" r="42" fill="#1B2A3D"/>
    <text x="360" y="100" text-anchor="middle" fill="#F7F6F3" font-size="30" font-weight="bold">2</text>
    <text x="360" y="165" text-anchor="middle" fill="#1B2A3D" font-size="24" font-weight="bold">Plan</text>
    <text x="360" y="190" text-anchor="middle" fill="#4A4A4A" font-size="14" font-family="Arial, sans-serif">Structure the approach</text>
  </g>

  <!-- Step 3: Coordinate -->
  <g>
    <circle cx="600" cy="90" r="42" fill="#1B2A3D"/>
    <text x="600" y="100" text-anchor="middle" fill="#F7F6F3" font-size="30" font-weight="bold">3</text>
    <text x="600" y="165" text-anchor="middle" fill="#1B2A3D" font-size="24" font-weight="bold">Coordinate</text>
    <text x="600" y="190" text-anchor="middle" fill="#4A4A4A" font-size="14" font-family="Arial, sans-serif">Align every partner</text>
  </g>

  <!-- Step 4: Execute -->
  <g>
    <circle cx="840" cy="90" r="42" fill="#1B2A3D"/>
    <text x="840" y="100" text-anchor="middle" fill="#F7F6F3" font-size="30" font-weight="bold">4</text>
    <text x="840" y="165" text-anchor="middle" fill="#1B2A3D" font-size="24" font-weight="bold">Execute</text>
    <text x="840" y="190" text-anchor="middle" fill="#4A4A4A" font-size="14" font-family="Arial, sans-serif">Deliver disciplined work</text>
  </g>

  <!-- Step 5: Deliver -->
  <g>
    <circle cx="1080" cy="90" r="42" fill="#1B2A3D"/>
    <text x="1080" y="100" text-anchor="middle" fill="#F7F6F3" font-size="30" font-weight="bold">5</text>
    <text x="1080" y="165" text-anchor="middle" fill="#1B2A3D" font-size="24" font-weight="bold">Deliver</text>
    <text x="1080" y="190" text-anchor="middle" fill="#4A4A4A" font-size="14" font-family="Arial, sans-serif">Honor every commitment</text>
  </g>

  <!-- Gold accent dots at connection points -->
  <circle cx="120" cy="90" r="4" fill="#B08D57"/>
  <circle cx="360" cy="90" r="4" fill="#B08D57"/>
  <circle cx="600" cy="90" r="4" fill="#B08D57"/>
  <circle cx="840" cy="90" r="4" fill="#B08D57"/>
  <circle cx="1080" cy="90" r="4" fill="#B08D57"/>
</svg>
